name: Done Comment Guard
on:
  issue_comment:
    types: [created]

jobs:
  validate-done:
    if: contains(github.event.comment.body, '[DONE]')
    runs-on: ubuntu-latest
    steps:
      - name: Check for PR link in DONE comment
        run: |
          COMMENT="${{ github.event.comment.body }}"
          if ! echo "$COMMENT" | grep -E "PR #[0-9]+"; then
            echo "❌ ERROR: [DONE] comment must include PR number"
            echo "Example: [DONE] PR #30"
            
            # Post error comment
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
              -d '{"body":"⚠️ [DONE] comment must include PR number. Example: [DONE] PR #30"}'
            
            exit 1
          fi
          echo "✅ DONE comment properly formatted"